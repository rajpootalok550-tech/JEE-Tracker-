<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JEE Tracker"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Alok's JEE Command Centre</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%}
body{background:#0a0a0f;color:#e8e8f0;font-family:Georgia,serif;overflow-x:hidden}
input,select,textarea{font-family:Georgia,serif;color:#ddd;font-size:16px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.tab-content{padding:14px 14px 90px;min-height:100vh}
.card{background:#12121e;border:1px solid #2a2a4a;border-radius:14px;padding:14px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:#a78bfa;margin-bottom:12px;letter-spacing:.5px}
.inp{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#ddd;padding:9px 11px;font-size:15px;outline:none;width:100%;font-family:Georgia,serif}
.btn{background:#2a1a5a;border:1px solid #a78bfa;color:#a78bfa;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:14px;font-weight:700}
.btn-sm{background:#1a1a2e;border:1px solid #3a3a5a;color:#aaa;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px}
.tag{font-size:9px;border-radius:4px;padding:2px 6px;border-width:1px;border-style:solid}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sbox{background:#1a1a2e;border-radius:10px;padding:12px 8px;text-align:center}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d1a;border-top:1px solid #2a2a4a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8px;font-family:sans-serif}
.bar-bg{background:#1a1a2e;border-radius:6px;height:8px;overflow:hidden}
.bar{height:8px;border-radius:6px;transition:width .5s}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a1a2e}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── helpers ──────────────────────────────────────────────────
const SUBS=["Physics","Chemistry","Math"];
const SC={Physics:"#f97316",Chemistry:"#22d3ee",Math:"#a78bfa"};
const TABS=["Daily","Homework","Weekly","Monthly","Mocks","Stats"];
const TI={Daily:"📅",Homework:"📝",Weekly:"📊",Monthly:"🗓️",Mocks:"🎯",Stats:"📈"};
const PRIO_C={High:"#f87171",Medium:"#fbbf24",Low:"#34d399"};

function dk(d=new Date()){return d.toISOString().split("T")[0]}
function wkStart(d=new Date()){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return dk(x)}
function mKey(d=new Date()){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function ld(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`}

// ── Timer hook ───────────────────────────────────────────────
function useTimer(){
  const[active,setActive]=useState(null);
  const[sessions,setSessions]=useState(()=>ld("jt_sess",{}));
  const[tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(n=>n+1),1000);return()=>clearInterval(t)},[]);

  const commit=useCallback((sub,startMs)=>{
    const el=Math.floor((Date.now()-startMs)/1000);
    if(el<1)return;
    const td=dk();
    setSessions(p=>{
      const n={...p,[td]:{...(p[td]||{}),[sub]:((p[td]||{})[sub]||0)+el}};
      sv("jt_sess",n);return n;
    });
  },[]);

  function start(sub){
    if(active){commit(active.sub,active.ms)}
    setActive({sub,ms:Date.now()});
  }
  function stop(){if(!active)return;commit(active.sub,active.ms);setActive(null)}

  function liveSecs(sub){
    const td=dk();
    const base=(sessions[td]||{})[sub]||0;
    const live=(active?.sub===sub)?Math.floor((Date.now()-active.ms)/1000):0;
    return base+live;
  }
  function daySecs(dateKey,sub){return(sessions[dateKey]||{})[sub]||0}
  return{active,start,stop,liveSecs,daySecs,sessions};
}

// ── Reusable ─────────────────────────────────────────────────
function Card({title,children}){return<div className="card"><div className="card-title">{title}</div>{children}</div>}
function SBox({label,value,color}){return<div className="sbox"><div style={{fontSize:20,fontWeight:700,color}}>{value}</div><div style={{fontSize:9,color:"#666",marginTop:2}}>{label}</div></div>}
function ProgBar({pct,color}){return<div className="bar-bg"><div className="bar" style={{width:`${Math.min(pct,100)}%`,background:color}}/></div>}
function SubSel({val,onChange}){return<select value={val} onChange={e=>onChange(e.target.value)} style={{background:"#1a1a2e",border:"1px solid #2a2a4a",color:SC[val],borderRadius:8,padding:"8px 6px",fontSize:13,flexShrink:0}}>{SUBS.map(s=><option key={s}>{s}</option>)}</select>}

// ═══════════════════════════════════════════════════════════════
// DAILY
// ═══════════════════════════════════════════════════════════════
function Daily({timer}){
  const today=dk();
  const[goals,setGoals]=useState(()=>ld(`jt_g_${today}`,[]));
  const[ng,setNg]=useState("");const[ns,setNs]=useState("Math");
  const[mood,setMood]=useState(()=>ld(`jt_mood_${today}`,0));
  const[journal,setJournal]=useState(()=>ld(`jt_jrn_${today}`,""));
  const[learned,setLearned]=useState(()=>ld(`jt_lrn_${today}`,[]));
  const[nl,setNl]=useState("");const[nls,setNls]=useState("Math");

  function sg(g){setGoals(g);sv(`jt_g_${today}`,g)}
  function addG(){if(!ng.trim())return;sg([...goals,{id:Date.now(),text:ng.trim(),sub:ns,done:false}]);setNg("")}
  function togG(id){sg(goals.map(g=>g.id===id?{...g,done:!g.done}:g))}
  function delG(id){sg(goals.filter(g=>g.id!==id))}
  function setMoodSv(v){setMood(v);sv(`jt_mood_${today}`,v)}
  function setJSv(v){setJournal(v);sv(`jt_jrn_${today}`,v)}
  function addL(){if(!nl.trim())return;const n=[...learned,{id:Date.now(),text:nl.trim(),sub:nls}];setLearned(n);sv(`jt_lrn_${today}`,n);setNl("")}
  function delL(id){const n=learned.filter(l=>l.id!==id);setLearned(n);sv(`jt_lrn_${today}`,n)}

  const done=goals.filter(g=>g.done).length;
  const pct=goals.length?Math.round(done/goals.length*100):0;
  const R=28,C=2*Math.PI*R;

  return<div className="tab-content">
    {/* Progress ring */}
    <Card title="📌 Aaj Ka Progress">
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <svg width={70} height={70} style={{flexShrink:0}}>
          <circle cx={35} cy={35} r={R} fill="none" stroke="#1e1e3a" strokeWidth={7}/>
          <circle cx={35} cy={35} r={R} fill="none" stroke="#a78bfa" strokeWidth={7}
            strokeDasharray={`${C*pct/100} ${C}`} strokeLinecap="round" transform="rotate(-90 35 35)" style={{transition:"stroke-dasharray .5s"}}/>
          <text x={35} y={40} textAnchor="middle" fill="#fff" fontSize={14} fontWeight="bold">{pct}%</text>
        </svg>
        <div>
          <div style={{fontSize:14,color:"#ccc",marginBottom:4}}>{done}/{goals.length} goals complete</div>
          <div style={{fontSize:11,color:"#555"}}>{new Date().toDateString()}</div>
          {pct===100&&<div style={{fontSize:12,color:"#34d399",marginTop:4}}>🎉 Sab done! Ekdum mast!</div>}
        </div>
      </div>
    </Card>

    {/* Goals */}
    <Card title="🎯 Aaj Ke Goals">
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SubSel val={ns} onChange={setNs}/>
        <input className="inp" style={{flex:1}} value={ng} onChange={e=>setNg(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addG()} placeholder="Goal likhao..."/>
        <button className="btn" onClick={addG} style={{flexShrink:0}}>+</button>
      </div>
      {goals.length===0&&<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"10px 0"}}>Koi goal nahi — add karo!</div>}
      {goals.map(g=><div key={g.id} className="row">
        <input type="checkbox" checked={g.done} onChange={()=>togG(g.id)} style={{accentColor:"#a78bfa",width:18,height:18,flexShrink:0}}/>
        <span style={{flex:1,fontSize:13,textDecoration:g.done?"line-through":"none",color:g.done?"#444":"#ddd"}}>{g.text}</span>
        <span className="tag" style={{color:SC[g.sub],borderColor:SC[g.sub],flexShrink:0}}>{g.sub}</span>
        <button onClick={()=>delG(g.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,flexShrink:0}}>✕</button>
      </div>)}
    </Card>

    {/* What I learned */}
    <Card title="💡 Aaj Kya Seekha">
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SubSel val={nls} onChange={setNls}/>
        <input className="inp" style={{flex:1}} value={nl} onChange={e=>setNl(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addL()} placeholder="Topic / concept..."/>
        <button className="btn" onClick={addL} style={{flexShrink:0}}>+</button>
      </div>
      {learned.length===0&&<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"8px 0"}}>Kuch note karo aaj!</div>}
      {learned.map(l=><div key={l.id} className="row">
        <span className="tag" style={{color:SC[l.sub],borderColor:SC[l.sub],minWidth:52,textAlign:"center",flexShrink:0}}>{l.sub}</span>
        <span style={{flex:1,fontSize:13,color:"#ccc"}}>{l.text}</span>
        <button onClick={()=>delL(l.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,flexShrink:0}}>✕</button>
      </div>)}
    </Card>

    {/* Mood */}
    <Card title="⚡ Aaj Ka Energy Level">
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        {["😴","😕","😐","😊","🚀"].map((e,i)=><button key={i} onClick={()=>setMoodSv(i+1)}
          style={{background:mood===i+1?"#1e1e3a":"#12121e",border:`1px solid ${mood===i+1?"#a78bfa":"#2a2a4a"}`,
            borderRadius:10,padding:"10px 14px",cursor:"pointer",fontSize:24,transition:"all .2s"}}>
          {e}
        </button>)}
      </div>
      {mood>0&&<div style={{textAlign:"center",fontSize:12,color:"#a78bfa",marginTop:10}}>
        {["Bahut thaka hua 😴","Thoda down 😕","Theek hai 😐","Accha feel ho raha hai 😊","Full josh mein! 🚀"][mood-1]}
      </div>}
    </Card>

    {/* Journal */}
    <Card title="📓 Aaj Ka Reflection">
      <textarea className="inp" value={journal} onChange={e=>setJSv(e.target.value)} rows={4}
        placeholder="Aaj kya accha gaya, kya nahi gaya, kal ke liye kya plan hai..."
        style={{resize:"vertical",lineHeight:1.6}}/>
    </Card>
  </div>
}

// ═══════════════════════════════════════════════════════════════
// HOMEWORK
// ═══════════════════════════════════════════════════════════════
function Homework(){
  const today=dk();
  const[hws,setHws]=useState(()=>ld("jt_hw",[]));
  const[text,setText]=useState("");
  const[sub,setSub]=useState("Math");
  const[due,setDue]=useState(today);
  const[prio,setPrio]=useState("Medium");
  const[filter,setFilter]=useState("Pending");
  const[showForm,setShowForm]=useState(false);

  function sHws(h){setHws(h);sv("jt_hw",h)}
  function add(){if(!text.trim())return;sHws([...hws,{id:Date.now(),text:text.trim(),sub,due,prio,done:false,created:today}]);setText("");setShowForm(false)}
  function tog(id){sHws(hws.map(h=>h.id===id?{...h,done:!h.done}:h))}
  function del(id){sHws(hws.filter(h=>h.id!==id))}

  const pending=hws.filter(h=>!h.done).length;
  const overdue=hws.filter(h=>!h.done&&h.due<today).length;
  const done=hws.filter(h=>h.done).length;

  const filtered=hws.filter(h=>{
    if(filter==="All")return true;
    if(filter==="Pending")return!h.done;
    if(filter==="Done")return h.done;
    if(filter==="Overdue")return!h.done&&h.due<today;
    return true;
  }).sort((a,b)=>a.done-b.done||a.due.localeCompare(b.due));

  return<div className="tab-content">
    <div className="grid3" style={{marginBottom:14}}>
      {[["📋 Total",hws.length,"#a78bfa"],["⏳ Pending",pending,"#fbbf24"],["🚨 Overdue",overdue,"#f87171"]].map(([l,v,c])=>
        <SBox key={l} label={l} value={v} color={c}/>)}
    </div>

    <button onClick={()=>setShowForm(!showForm)} style={{...{cursor:"pointer"},width:"100%",padding:"12px",borderRadius:12,
      border:"1px solid #a78bfa",background:showForm?"#1e1e3a":"#12121e",color:"#a78bfa",fontSize:14,marginBottom:14}}>
      {showForm?"✕ Cancel":"➕ Naya Homework Add Karo"}
    </button>

    {showForm&&<Card title="📝 Homework Details">
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SubSel val={sub} onChange={setSub}/>
        <select value={prio} onChange={e=>setPrio(e.target.value)}
          style={{background:"#1a1a2e",border:"1px solid #2a2a4a",color:PRIO_C[prio],borderRadius:8,padding:"8px 6px",fontSize:13}}>
          {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
        </select>
      </div>
      <input className="inp" value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Homework description..." style={{marginBottom:10}}/>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:12,color:"#777",flexShrink:0}}>Due date:</span>
        <input type="date" className="inp" value={due} onChange={e=>setDue(e.target.value)} style={{colorScheme:"dark"}}/>
      </div>
      <button className="btn" onClick={add} style={{width:"100%",padding:11}}>✅ Save Homework</button>
    </Card>}

    <div style={{display:"flex",gap:6,marginBottom:14}}>
      {["All","Pending","Done","Overdue"].map(f=><button key={f} onClick={()=>setFilter(f)}
        style={{flex:1,padding:"7px 0",borderRadius:8,border:"1px solid #2a2a4a",
          background:filter===f?"#1e1e3a":"#12121e",color:filter===f?"#a78bfa":"#555",fontSize:11,cursor:"pointer"}}>
        {f}
      </button>)}
    </div>

    {filtered.length===0&&<div style={{color:"#444",fontSize:13,textAlign:"center",padding:20}}>
      {filter==="Overdue"?"Koi overdue homework nahi! 🎉":"Koi homework nahi is category mein!"}
    </div>}

    {filtered.map(h=>{
      const isOD=!h.done&&h.due<today;
      return<div key={h.id} style={{background:"#12121e",border:`1px solid ${isOD?"#f8717150":h.done?"#1e1e2a":"#2a2a4a"}`,
        borderRadius:12,padding:12,marginBottom:10,opacity:h.done?.55:1}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <input type="checkbox" checked={h.done} onChange={()=>tog(h.id)}
            style={{accentColor:"#a78bfa",width:18,height:18,marginTop:2,flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:h.done?"#555":"#ddd",textDecoration:h.done?"line-through":"none",marginBottom:7}}>{h.text}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <span className="tag" style={{color:SC[h.sub],borderColor:SC[h.sub]}}>{h.sub}</span>
              <span className="tag" style={{color:PRIO_C[h.prio],borderColor:PRIO_C[h.prio]}}>{h.prio}</span>
              <span className="tag" style={{color:isOD?"#f87171":"#666",borderColor:isOD?"#f87171":"#444"}}>📅 {h.due}</span>
              {isOD&&<span className="tag" style={{color:"#f87171",borderColor:"#f87171"}}>OVERDUE!</span>}
            </div>
          </div>
          <button onClick={()=>del(h.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,flexShrink:0}}>✕</button>
        </div>
      </div>
    })}
  </div>
}

// ═══════════════════════════════════════════════════════════════
// WEEKLY
// ═══════════════════════════════════════════════════════════════
function Weekly({timer}){
  const[note,setNote]=useState(()=>ld(`jt_wn_${wkStart()}`,""));
  function saveNote(v){setNote(v);sv(`jt_wn_${wkStart()}`,v)}

  const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d});
  const subTotals={};
  SUBS.forEach(s=>{subTotals[s]=days.reduce((a,d)=>a+timer.daySecs(dk(d),s),0)});
  const grand=Object.values(subTotals).reduce((a,b)=>a+b,0);
  const maxDay=Math.max(...days.map(d=>SUBS.reduce((a,s)=>a+timer.daySecs(dk(d),s),0)),1);

  return<div className="tab-content">
    <Card title="📊 Is Hafte Ki Study">
      <div style={{textAlign:"center",fontSize:13,color:"#a78bfa",marginBottom:14}}>
        Total: <strong>{fmtT(grand)}</strong>
      </div>
      {SUBS.map(s=>{
        const pct=grand?Math.round(subTotals[s]/grand*100):0;
        return<div key={s} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
            <span style={{color:SC[s]}}>{s}</span>
            <span style={{color:"#888"}}>{fmtT(subTotals[s])} · {pct}%</span>
          </div>
          <ProgBar pct={pct} color={SC[s]}/>
        </div>
      })}
    </Card>

    <Card title="📅 Daily Breakdown (Last 7 Days)">
      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:100,paddingBottom:4}}>
        {days.map(d=>{
          const key=dk(d);
          const total=SUBS.reduce((a,s)=>a+timer.daySecs(key,s),0);
          const h=Math.max((total/maxDay)*80,total>0?4:2);
          const isToday=key===dk();
          return<div key={key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{fontSize:8,color:"#888"}}>{total>0?(Math.round(total/360)/10)+"h":""}</div>
            <div style={{width:"100%",flex:1,display:"flex",alignItems:"flex-end"}}>
              <div style={{width:"100%",height:h,background:isToday?"#a78bfa":"#3a3a5a",borderRadius:"4px 4px 0 0",minHeight:2}}/>
            </div>
            <div style={{fontSize:10,color:isToday?"#a78bfa":"#666"}}>
              {["S","M","T","W","T","F","S"][d.getDay()]}
            </div>
          </div>
        })}
      </div>
    </Card>

    <Card title="📝 Weekly Review">
      <textarea className="inp" value={note} onChange={e=>saveNote(e.target.value)} rows={4}
        placeholder="Is week kya accha gaya? Kya struggle hua? Agle week ki plan..." style={{resize:"vertical",lineHeight:1.6}}/>
    </Card>
  </div>
}

// ═══════════════════════════════════════════════════════════════
// MONTHLY
// ═══════════════════════════════════════════════════════════════
function Monthly({timer}){
  const now=new Date();
  const mk2=mKey();
  const[note,setNote]=useState(()=>ld(`jt_mn_${mk2}`,""));
  function saveNote(v){setNote(v);sv(`jt_mn_${mk2}`,v)}

  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const monthDays=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth(),i+1);return dk(d);
  });
  const subTotals={};
  SUBS.forEach(s=>{subTotals[s]=monthDays.reduce((a,k)=>a+timer.daySecs(k,s),0)});
  const grand=Object.values(subTotals).reduce((a,b)=>a+b,0);
  const studyDays=monthDays.filter(k=>SUBS.some(s=>timer.daySecs(k,s)>0)).length;
  const TARGET=25*3600;
  const firstDow=new Date(now.getFullYear(),now.getMonth(),1).getDay();

  return<div className="tab-content">
    <Card title={`🗓️ ${now.toLocaleString("default",{month:"long"})} ${now.getFullYear()}`}>
      <div className="grid2" style={{marginBottom:14}}>
        <SBox label="Total Study" value={fmtT(grand)} color="#a78bfa"/>
        <SBox label="Study Days" value={`${studyDays}/${daysInMonth}`} color="#22d3ee"/>
      </div>
      {SUBS.map(s=>{
        const pct=Math.round(subTotals[s]/TARGET*100);
        return<div key={s} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
            <span style={{color:SC[s]}}>{s}</span>
            <span style={{color:"#888"}}>{fmtT(subTotals[s])} / 25h</span>
          </div>
          <ProgBar pct={pct} color={SC[s]}/>
          <div style={{fontSize:10,color:"#555",textAlign:"right",marginTop:2}}>{Math.min(pct,100)}% of target</div>
        </div>
      })}
    </Card>

    <Card title="🔥 Study Heatmap">
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:"#555",paddingBottom:4}}>{d}</div>)}
        {Array.from({length:firstDow}).map((_,i)=><div key={`e${i}`}/>)}
        {monthDays.map(key=>{
          const total=SUBS.reduce((a,s)=>a+timer.daySecs(key,s),0);
          const past=key<=dk();
          const intensity=Math.min(total/7200,1);
          return<div key={key} title={key}
            style={{aspectRatio:1,borderRadius:3,
              background:!past?"#0d0d1a":total===0?"#1a1a2a":`rgba(167,139,250,${0.15+intensity*0.85})`}}/>
        })}
      </div>
      <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:10,alignItems:"center"}}>
        <span style={{fontSize:9,color:"#555"}}>Less</span>
        {[0.15,0.35,0.55,0.75,1].map(v=><div key={v} style={{width:12,height:12,borderRadius:2,background:`rgba(167,139,250,${v})`}}/>)}
        <span style={{fontSize:9,color:"#555"}}>More</span>
      </div>
    </Card>

    <Card title="📝 Monthly Reflection">
      <textarea className="inp" value={note} onChange={e=>saveNote(e.target.value)} rows={4}
        placeholder="Is month ki achievements, struggles, agle month ke targets..." style={{resize:"vertical",lineHeight:1.6}}/>
    </Card>
  </div>
}

// ═══════════════════════════════════════════════════════════════
// MOCK TESTS
// ═══════════════════════════════════════════════════════════════
function Mocks(){
  const[mocks,setMocks]=useState(()=>ld("jt_mocks",[]));
  const[showForm,setShowForm]=useState(false);
  const[date,setDate]=useState(dk());
  const[type,setType]=useState("JEE Mains");
  const[scores,setScores]=useState({Physics:"",Chemistry:"",Math:""});
  const[pctile,setPctile]=useState("");
  const[weak,setWeak]=useState("");

  function add(){
    const phy=parseFloat(scores.Physics)||0,ch=parseFloat(scores.Chemistry)||0,ma=parseFloat(scores.Math)||0;
    const m={id:Date.now(),date,type,phy,ch,ma,total:phy+ch+ma,pctile:parseFloat(pctile)||0,weak};
    const next=[m,...mocks].sort((a,b)=>b.date.localeCompare(a.date));
    setMocks(next);sv("jt_mocks",next);
    setScores({Physics:"",Chemistry:"",Math:""});setPctile("");setWeak("");setShowForm(false);
  }
  function del(id){const n=mocks.filter(m=>m.id!==id);setMocks(n);sv("jt_mocks",n)}

  const best=mocks.length?Math.max(...mocks.map(m=>m.total)):0;
  const avg=mocks.length?Math.round(mocks.reduce((a,m)=>a+m.total,0)/mocks.length):0;

  return<div className="tab-content">
    <div className="grid3" style={{marginBottom:14}}>
      <SBox label="Mocks Given" value={mocks.length} color="#a78bfa"/>
      <SBox label="Best Score" value={best||"—"} color="#22d3ee"/>
      <SBox label="Avg Score" value={avg||"—"} color="#f97316"/>
    </div>

    <button onClick={()=>setShowForm(!showForm)} style={{width:"100%",padding:12,borderRadius:12,
      border:"1px solid #a78bfa",background:showForm?"#1e1e3a":"#12121e",color:"#a78bfa",fontSize:14,cursor:"pointer",marginBottom:14}}>
      {showForm?"✕ Cancel":"➕ Mock Result Add Karo"}
    </button>

    {showForm&&<Card title="📝 Mock Test Entry">
      <div className="grid2" style={{marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:"#666",marginBottom:4}}>Date</div>
          <input type="date" className="inp" value={date} onChange={e=>setDate(e.target.value)} style={{colorScheme:"dark"}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#666",marginBottom:4}}>Type</div>
          <select className="inp" value={type} onChange={e=>setType(e.target.value)}>
            <option>JEE Mains</option><option>JEE Advanced</option><option>Allen Test</option><option>Other</option>
          </select>
        </div>
      </div>
      <div className="grid3" style={{marginBottom:10}}>
        {SUBS.map(s=><div key={s}>
          <div style={{fontSize:11,color:SC[s],marginBottom:4}}>{s}</div>
          <input type="number" className="inp" value={scores[s]} placeholder="Score"
            onChange={e=>setScores(p=>({...p,[s]:e.target.value}))}/>
        </div>)}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"#666",marginBottom:4}}>Percentile (optional)</div>
        <input type="number" className="inp" value={pctile} onChange={e=>setPctile(e.target.value)} placeholder="e.g. 85.5"/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"#666",marginBottom:4}}>Weak Areas</div>
        <input className="inp" value={weak} onChange={e=>setWeak(e.target.value)} placeholder="e.g. GOC, Limits, Thermodynamics"/>
      </div>
      <button className="btn" onClick={add} style={{width:"100%",padding:11}}>💾 Save Mock</button>
    </Card>}

    {mocks.map(m=><div key={m.id} style={{background:"#12121e",border:"1px solid #2a2a4a",borderRadius:12,padding:14,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <div>
          <div style={{fontSize:13,color:"#a78bfa",fontWeight:700}}>{m.type}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2}}>{m.date}</div>
        </div>
        <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
          <div>
            <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{m.total}</div>
            {m.pctile>0&&<div style={{fontSize:11,color:"#22d3ee"}}>{m.pctile} %ile</div>}
          </div>
          <button onClick={()=>del(m.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
      </div>
      <div className="grid3">
        {[["P",m.phy,"#f97316"],["C",m.ch,"#22d3ee"],["M",m.ma,"#a78bfa"]].map(([l,v,c])=>
          <div key={l} style={{background:`${c}15`,border:`1px solid ${c}40`,borderRadius:8,padding:8,textAlign:"center"}}>
            <div style={{fontSize:9,color:c,marginBottom:2}}>{l}</div>
            <div style={{fontSize:16,color:"#fff",fontWeight:700}}>{v}</div>
          </div>
        )}
      </div>
      {m.weak&&<div style={{marginTop:10,fontSize:11,color:"#f87171",background:"#f8717110",borderRadius:6,padding:"6px 10px"}}>⚠️ Weak: {m.weak}</div>}
    </div>)}
    {mocks.length===0&&<div style={{color:"#444",fontSize:13,textAlign:"center",padding:24}}>Abhi tak koi mock add nahi kiya!</div>}
  </div>
}

// ═══════════════════════════════════════════════════════════════
// STATS / ANALYTICS
// ═══════════════════════════════════════════════════════════════
function Stats({timer}){
  const mocks=ld("jt_mocks",[]);
  const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return dk(d)});

  const sub30={};
  SUBS.forEach(s=>{sub30[s]=last30.reduce((a,k)=>a+timer.daySecs(k,s),0)});
  const grand=Object.values(sub30).reduce((a,b)=>a+b,0);

  const moods=last30.map(k=>ld(`jt_mood_${k}`,0)).filter(v=>v>0);
  const avgMood=moods.length?(moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1):"N/A";

  const totalG=last30.reduce((a,k)=>a+(ld(`jt_g_${k}`,[]).length),0);
  const doneG=last30.reduce((a,k)=>a+(ld(`jt_g_${k}`,[]).filter(g=>g.done).length),0);
  const cr=totalG?Math.round(doneG/totalG*100):0;

  const recent5=mocks.slice(0,5).reverse();
  const maxMock=recent5.length?Math.max(...recent5.map(m=>m.total),1):1;

  const insights=[
    grand<10*3600&&"⚠️ Study hours bahut kam hain — daily 3+ hours ka target rakho!",
    cr<50&&totalG>3&&"📌 Goal completion rate low hai — chhote aur realistic goals set karo",
    sub30.Chemistry<sub30.Math*0.4&&grand>0&&"⚗️ Chemistry ko aur time do — JEE mein bahut easy marks hain",
    mocks.length===0&&"📝 Abhi tak koi mock nahi diya — jaldi ek schedule karo!",
    mocks.length>2&&mocks[0].total<mocks[1].total&&"📉 Last mock score gira — weak areas pe focus badhao",
    grand>50*3600&&"🔥 50+ hours complete! Preparation strong hai!",
    "🎯 Target: IIT Delhi CSE | JEE Advanced 300+ | JEE Mains 250+"
  ].filter(Boolean);

  return<div className="tab-content">
    <Card title="📈 Last 30 Days Summary">
      <div className="grid2">
        <SBox label="Total Study" value={fmtT(grand)} color="#a78bfa"/>
        <SBox label="Goal Completion" value={`${cr}%`} color="#22d3ee"/>
        <SBox label="Avg Energy" value={avgMood==="N/A"?"N/A":`${avgMood}/5`} color="#fbbf24"/>
        <SBox label="Mocks Given" value={mocks.length} color="#f97316"/>
      </div>
    </Card>

    <Card title="📚 Subject Split (30 days)">
      {grand===0&&<div style={{color:"#444",fontSize:12,textAlign:"center"}}>Abhi koi data nahi</div>}
      {SUBS.map(s=>{
        const pct=grand?Math.round(sub30[s]/grand*100):0;
        return<div key={s} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
            <span style={{color:SC[s]}}>{s}</span>
            <span style={{color:"#888"}}>{pct}% · {fmtT(sub30[s])}</span>
          </div>
          <ProgBar pct={pct} color={SC[s]}/>
        </div>
      })}
    </Card>

    {recent5.length>0&&<Card title="🎯 Mock Score Trend">
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:90}}>
        {recent5.map(m=>{
          const h=Math.max((m.total/maxMock)*75,4);
          const pctOf300=Math.round(m.total/300*100);
          return<div key={m.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{fontSize:9,color:"#aaa"}}>{m.total}</div>
            <div style={{width:"80%",height:h,background:"#a78bfa",borderRadius:"4px 4px 0 0"}}/>
            <div style={{fontSize:8,color:"#555"}}>{m.date.slice(5)}</div>
          </div>
        })}
      </div>
      {mocks.length>1&&<div style={{textAlign:"center",fontSize:12,marginTop:10,
        color:mocks[0].total>=mocks[mocks.length-1].total?"#34d399":"#f87171"}}>
        {mocks[0].total>=mocks[mocks.length-1].total?"📈":"📉"} {Math.abs(mocks[0].total-mocks[mocks.length-1].total)} points {mocks[0].total>=mocks[mocks.length-1].total?"improvement":"drop"} since first mock
      </div>}
    </Card>}

    <Card title="💡 Smart Insights">
      {insights.map((tip,i)=><div key={i} style={{fontSize:12,color:"#ccc",padding:"9px 12px",background:"#1a1a2e",
        borderRadius:8,marginBottom:8,borderLeft:"3px solid #a78bfa",lineHeight:1.5}}>{tip}</div>)}
    </Card>
  </div>
}

// ═══════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("Daily");
  const[streak,setStreak]=useState(()=>ld("jt_streak",{count:0,last:""}));
  const timer=useTimer();
  const today=dk();

  useEffect(()=>{
    if(streak.last!==today){
      const yd=new Date();yd.setDate(yd.getDate()-1);
      const yk=dk(yd);
      const next={count:streak.last===yk?streak.count+1:1,last:today};
      setStreak(next);sv("jt_streak",next);
    }
  },[]);

  const totalToday=SUBS.reduce((a,s)=>a+timer.liveSecs(s),0);

  return<div style={{minHeight:"100vh",background:"#0a0a0f"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#1a0533,#0a1a3a)",padding:"14px 16px 12px",
      borderBottom:"1px solid #2a2a4a",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:10,color:"#a78bfa",letterSpacing:3,textTransform:"uppercase"}}>JEE 2027 · IIT Delhi CSE</div>
          <div style={{fontSize:18,fontWeight:700,color:"#fff",marginTop:2}}>Alok's Command Centre</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:24}}>🔥</div>
          <div style={{fontSize:11,color:"#fbbf24"}}>{streak.count} day streak</div>
        </div>
      </div>

      {/* Subject Timers */}
      <div style={{display:"flex",gap:6}}>
        {SUBS.map(s=>{
          const isActive=timer.active?.sub===s;
          return<button key={s} onClick={()=>isActive?timer.stop():timer.start(s)}
            style={{flex:1,padding:"6px 4px",borderRadius:8,
              border:`1px solid ${isActive?SC[s]:"#2a2a4a"}`,
              background:isActive?`${SC[s]}15`:"#12121e",cursor:"pointer",
              color:SC[s],transition:"all .2s"}}>
            <div style={{fontSize:8,marginBottom:1,fontFamily:"sans-serif"}}>{isActive?"⏸ PAUSE":"▶"} {s}</div>
            <div style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{fmtT(timer.liveSecs(s))}</div>
          </button>
        })}
      </div>
    </div>

    {/* CONTENT */}
    {tab==="Daily"&&<Daily timer={timer}/>}
    {tab==="Homework"&&<Homework/>}
    {tab==="Weekly"&&<Weekly timer={timer}/>}
    {tab==="Monthly"&&<Monthly timer={timer}/>}
    {tab==="Mocks"&&<Mocks/>}
    {tab==="Stats"&&<Stats timer={timer}/>}

    {/* BOTTOM NAV */}
    <nav className="nav">
      {TABS.map(t=><button key={t} onClick={()=>setTab(t)}
        style={{color:tab===t?"#a78bfa":"#555"}}>
        <span style={{fontSize:20}}>{TI[t]}</span>
        <span>{t}</span>
      </button>)}
    </nav>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
